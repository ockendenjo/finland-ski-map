name: "main"

on:
  push:
    branches: [ main ]

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout source code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Node modules
        working-directory: ui
        run: npm install

      - name: Check formatting
        working-directory: ui
        run: npx prettier --check .

      - name: Build
        working-directory: ui
        run: npm run build

      - name: Copy JSON files
        run: |
          jq -c . < ui/huts.json > /tmp/huts.json
          cp /tmp/huts.json ui/dist
          cp ui/pistes.gpx ui/dist

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: build
          path: ui/dist

  deploy:
    name: deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: pro
    needs: [build]
    permissions:
      id-token: write   # AWS OIDC
      contents: read
    steps:
      - name: Checkout source code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup terraform
        uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4.0.0

      - name: Download artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: build
          path: ui/dist

      - name: configure aws credentials
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37 # v6.1.0
        with:
          role-to-assume: ${{vars.AWS_ROLE_ARN}}
          aws-region: eu-west-1

      - name: Terraform Init
        working-directory: stack
        run: |
          terraform init -backend-config="tfvars/backend-pro.hcl"

      - name: Terraform Apply
        working-directory: stack
        run: |
          terraform apply -auto-approve -var-file="tfvars/pro.tfvars"

      - name: S3 Sync
        run: aws s3 sync ./ui/dist s3://${VARS_S3_BUCKET_NAME}
        env:
          VARS_S3_BUCKET_NAME: ${{vars.S3_BUCKET_NAME}}
